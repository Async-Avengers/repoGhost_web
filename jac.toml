[project]
name = "repoghost"
version = "0.1.0"
description = "RepoGhost - desktop-ready AI developer sidecar built with Jac"
entry-point = "main.jac"

[plugins.client]
enabled = true

[plugins.client.vite]
enabled = true
port = 8001
host = "127.0.0.1"
plugins = ["tailwindcss()", "repoghostClientResolve(buildDir)"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'", "import repoghostClientResolve from '../../../vite.repoghost.resolve.mjs'"]

[tool.repoghost.desktop]
widget_mode = "compact-floating"
workspace_mode = "expanded"
always_on_top_ready = true
packaging_target = "tauri"
notes = "Desktop packaging is not wired yet, but the UI shell and local-first workflow are prepared for a Tauri/Jac desktop wrapper."

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
